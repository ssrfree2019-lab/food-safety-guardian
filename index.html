<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>食品安全守护者</title><style>
@font-face{font-family:"Noto Sans SC";src:local("Noto Sans SC")}@font-face{font-family:"Microsoft YaHei";src:local("Microsoft YaHei")}
*{box-sizing:border-box}html,body{margin:0;background:#061525;overflow:hidden;font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;color:#F4FAFF}.comp{position:relative;width:1080px;height:1920px;overflow:hidden;background:radial-gradient(circle at 55% 20%,#163444,#061525 65%)}.scene{position:absolute;inset:0;padding:150px 80px 130px;display:flex;flex-direction:column;gap:34px;overflow:hidden}.factory{position:absolute;inset:0;opacity:.4;background-image:linear-gradient(90deg,transparent 9%,#9fdfff22 10%,transparent 11%),linear-gradient(0deg,transparent 14%,#9fdfff22 15%,transparent 16%);background-size:180px 220px}.k{font-size:34px;font-weight:800;letter-spacing:8px;color:#28B8FF}.h{font-size:100px;line-height:1.08;font-weight:900;text-shadow:0 14px 42px #000}.sub{font-size:54px;font-weight:800}.caption{position:absolute;left:80px;right:80px;bottom:132px;min-height:126px;padding:28px 40px;border-radius:28px;background:#03101be8;border:2px solid #a8dfff33;font-size:50px;font-weight:700;text-align:center}.person{position:absolute;left:380px;bottom:360px;width:320px;height:820px;filter:drop-shadow(0 28px 26px #000a)}.head{position:absolute;left:90px;top:14px;width:146px;height:154px;border-radius:52%;background:#d9e8ed;border:10px solid #d7edf4}.mask{position:absolute;left:106px;top:88px;width:112px;height:54px;border-radius:18px;background:#d9f0f4;border:3px solid #8fb5c2}.body{position:absolute;left:51px;top:150px;width:230px;height:410px;border-radius:74px 74px 38px 38px;background:linear-gradient(90deg,#c7d9df,#eef6f8 46%,#b5cbd3);border:3px solid #8aa7b3}.leg{position:absolute;top:520px;width:92px;height:282px;border-radius:18px 18px 44px 44px;background:#c1d4da}.l1{left:64px}.l2{right:57px}.barriers{display:flex;gap:25px;margin:120px 0 0 190px}.barrier{width:230px;height:980px;border:5px solid #FF3B3B;background:#ff3b3b26;box-shadow:0 0 55px #ff3b3b55;display:flex;align-items:center;justify-content:center;font-size:62px;font-weight:900;writing-mode:vertical-rl;letter-spacing:14px}.hud{margin:100px 0 0 auto;width:440px;display:flex;flex-direction:column;gap:26px}.card{padding:28px;border-radius:24px;background:#051522e8;border:2px solid #28B8FF;font-size:34px}.alert{border-color:#FF3B3B;color:#FF3B3B}.choice{margin-top:80px;padding:55px;background:#6d1018dd;border:5px solid #FF3B3B;font-size:76px;font-weight:900;text-align:center;box-shadow:0 0 80px #ff3b3b55}.actions{display:flex;gap:20px;margin-top:500px}.pill{flex:1;padding:26px 10px;border-radius:60px;border:3px solid #28B8FF;background:#08314b;font-size:40px;font-weight:900;text-align:center}.shield{width:340px;height:410px;margin:90px auto 0;background:linear-gradient(145deg,#28B8FF,#0b5277);clip-path:polygon(50% 0,92% 16%,86% 70%,50% 100%,14% 70%,8% 16%);filter:drop-shadow(0 0 45px #28b8ff88);display:flex;align-items:center;justify-content:center}.check{width:88px;height:170px;border-right:28px solid #F4FAFF;border-bottom:28px solid #F4FAFF;transform:rotate(42deg) translate(-16px,10px)}.final{align-items:center;justify-content:center;text-align:center}.gold{color:#FFC857}.brand{font-size:54px;font-weight:900;letter-spacing:9px}.signature{font-size:42px;color:#c9e4ee}.risk{color:#FF3B3B}
</style></head><body><div class="comp" data-composition-id="food-safety-guardian" data-width="1080" data-height="1920" data-start="0" data-duration="30">
<div class="factory" data-layout-ignore></div>
<section class="scene s1"><div class="k">QUALITY / 01</div><div class="h">每一次放行<br>都是一次考验</div><div class="person"><div class="head"></div><div class="mask"></div><div class="body"></div><div class="leg l1"></div><div class="leg l2"></div></div><div class="caption">每一次放行，都可能是一场考验</div></section>
<section class="scene s2"><div class="k risk">PRESSURE / 02</div><div class="h">层层压力</div><div class="barriers"><div class="barrier">交期</div><div class="barrier">产量</div><div class="barrier">别停线</div></div><div class="caption">进度、成本、人情……层层压力迎面而来</div></section>
<section class="scene s3"><div class="k">INSPECTION / 03</div><div class="h">风险不会消失</div><div class="hud"><div class="card alert">关键温度<br><b>6.8°C</b></div><div class="card alert">异物风险<br><b>已锁定</b></div><div class="card">批次状态<br><b>待隔离</b></div></div><div class="caption">风险，不会因为催促而消失</div></section>
<section class="scene s4"><div class="choice">先生产再整改</div><div class="choice">这次先放过</div><div class="h" style="margin-top:80px">先放行？<span class="risk">还是守底线？</span></div><div class="caption">面对妥协，他必须作出选择</div></section>
<section class="scene s5"><div class="k">ACTION / 05</div><div class="h">用专业冲破阻力</div><div class="actions"><div class="pill risk">停线</div><div class="pill">隔离</div><div class="pill">整改</div><div class="pill">复核</div></div><div class="caption">停线、隔离、整改、复核——用专业冲破阻力</div></section>
<section class="scene s6"><div class="shield"><div class="check"></div></div><div class="h" style="text-align:center;margin-top:80px">守住底线<br><span style="color:#28B8FF">放心交付</span></div><div class="caption">因为守住底线，才能放心交付</div></section>
<section class="scene s7 final"><div class="shield"><div class="check"></div></div><div class="h">食品安全<br><span style="color:#28B8FF">质量人用行动守护</span></div><div class="brand gold">食界公益行</div><div class="signature">老张的食安与精益</div></section>
</div><script src="./node_modules/gsap/dist/gsap.min.js"></script><script>
const tl=gsap.timeline({paused:true});window.__timelines=window.__timelines||{};window.__timelines['food-safety-guardian']=tl;
tl.set('.scene',{autoAlpha:0});
const scenes=[['.s1',0,3],['.s2',3,5],['.s3',8,5],['.s4',13,5],['.s5',18,5],['.s6',23,4],['.s7',27,3]];
scenes.forEach(([s,start,d],i)=>{tl.set(s,{autoAlpha:1},start).from(s+' .k, '+s+' .h',{y:60,opacity:0,duration:.65,stagger:.14,ease:'power3.out'},start+.18);if(i<6)tl.from(s+' .caption',{y:42,opacity:0,duration:.55,ease:'power2.out'},start+.35);if(i<scenes.length-1)tl.to(s,{clipPath:'inset(0 100% 0 0)',duration:.5,ease:'power3.inOut'},start+d-.5).set(s,{autoAlpha:0},start+d);});
tl.from('.s1 .person',{y:100,scale:.88,opacity:0,duration:.8,ease:'back.out(1.2)'},.25);
tl.from('.s2 .barrier',{x:260,opacity:0,duration:.65,stagger:.16,ease:'expo.out'},3.25);
tl.from('.s3 .card',{x:70,opacity:0,duration:.55,stagger:.2,ease:'power4.out'},8.35);
tl.from('.s4 .choice',{scale:1.35,opacity:0,duration:.5,stagger:.35,ease:'back.out(1.4)'},13.3);
tl.from('.s5 .pill',{scale:.4,opacity:0,duration:.42,stagger:.25,ease:'back.out(1.6)'},18.5);
tl.from('.s6 .shield',{scale:.5,rotate:-12,opacity:0,duration:.9,ease:'elastic.out(1,.55)'},23.2);
tl.from('.s7 .shield',{scale:.6,opacity:0,duration:.7,ease:'back.out(1.3)'},27.15).from('.s7 .brand,.s7 .signature',{y:35,opacity:0,duration:.5,stagger:.25,ease:'power2.out'},28);
</script></body></html>
